name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # validate-version — tag must match Cargo.toml version
  # ==========================================================================
  validate-version:
    name: Validate tag matches Cargo.toml
    runs-on: brefwiz
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            if [ "$TAG" != "$CARGO_VERSION" ]; then
              echo "::error::Tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION'"
              exit 1
            fi
          fi
          echo "Version: $CARGO_VERSION"

  # ==========================================================================
  # publish — cargo publish to brefwiz registry
  # ==========================================================================
  publish:
    name: Publish to Forgejo Registry
    runs-on: brefwiz
    needs: [validate-version]
    container:
      image: ${{ vars.RUST_CI_IMAGE }}
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish crate
        env:
          CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          if ! cargo publish --registry brefwiz 2>&1 | tee /tmp/publish.log; then
            if grep -q "already uploaded\|already exists" /tmp/publish.log; then
              echo "⚠️ otel-bootstrap already published at this version"
              exit 0
            else
              cat /tmp/publish.log; exit 1
            fi
          fi
      - name: Summary
        if: success()
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          echo "## 📦 otel-bootstrap v${VERSION} Published" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** brefwiz" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # gitea-release — create release with changelog from git log
  # ==========================================================================
  gitea-release:
    name: Create Gitea Release
    runs-on: brefwiz
    needs: [publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GITEA_TOKEN: ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TAG_NAME="${VERSION}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..${TAG_NAME} --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          CHANGELOG_JSON=$(printf '%s' "${CHANGELOG}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          printf '{"tag_name":"%s","name":"v%s","body":%s,"draft":false,"prerelease":false}' \
            "${TAG_NAME}" "${VERSION}" "${CHANGELOG_JSON}" | \
          curl -s -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -d @-
          echo "## 🚀 Released v${VERSION}" >> $GITHUB_STEP_SUMMARY
