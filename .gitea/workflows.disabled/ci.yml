# CI — consumes brefwiz/ci-workflows composite actions via local checkout.
#
# Why the double-checkout: this Gitea instance has "require sign-in to view"
# enabled, so the runner's auto-issued job token can't git-fetch the
# ci-workflows repo even though it's public. Each job pre-checks-out
# ci-workflows with PACKAGE_READER_TOKEN, then `uses: ./.ci-workflows/...`
# by local path. Composites accept `checkout: false` to avoid re-running
# checkout on top of our manual one.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # ==========================================================================
  # fmt
  # ==========================================================================
  fmt:
    name: Code Formatting
    runs-on: brefwiz
    container:
      image: ${{ vars.RUST_CI_IMAGE }}
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    env:
      CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}"
      CI_LOGS_TOKEN: ${{ secrets.CI_LOGS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: ./.ci-workflows/.gitea/actions/fmt
        with:
          checkout: "false"
      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: fmt

  # ==========================================================================
  # clippy
  # ==========================================================================
  clippy:
    name: Clippy Lints
    runs-on: brefwiz
    container:
      image: ${{ vars.RUST_CI_IMAGE }}
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    env:
      CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}"
      CI_LOGS_TOKEN: ${{ secrets.CI_LOGS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: ./.ci-workflows/.gitea/actions/clippy
        with:
          checkout: "false"
      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: lint
      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: lockfile-diff
          log-file: /tmp/ci-lockfile-diff.log

  # ==========================================================================
  # audit
  # ==========================================================================
  audit:
    name: Security Audit
    runs-on: brefwiz
    container:
      image: ${{ vars.RUST_CI_IMAGE }}
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    env:
      CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}"
      CI_LOGS_TOKEN: ${{ secrets.CI_LOGS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: ./.ci-workflows/.gitea/actions/audit
        with:
          checkout: "false"
          policies-token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: audit

  # ==========================================================================
  # test
  # ==========================================================================
  test:
    name: Unit Tests
    runs-on: brefwiz
    container:
      image: ${{ vars.RUST_CI_IMAGE }}
      credentials:
        username: ${{ secrets.HARBOR_USER }}
        password: ${{ secrets.HARBOR_TOKEN }}
    env:
      CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}"
      CI_LOGS_TOKEN: ${{ secrets.CI_LOGS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: ./.ci-workflows/.gitea/actions/test
        with:
          checkout: "false"
      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: test

  # ==========================================================================
  # e2e + coverage — unique pattern: OTel Collector spawned on host via
  # docker compose, coverage invoked inside a sibling container using
  # --network host to reach the collector. The ci-workflows `coverage`
  # composite runs in-container which can't orchestrate its own collector,
  # so this job stays bespoke. Registry token is threaded into the inner
  # docker invocation explicitly.
  # ==========================================================================
  e2e:
    name: E2E + Coverage
    runs-on: brefwiz
    env:
      CI_LOGS_TOKEN: ${{ secrets.CI_LOGS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}

      - name: Login to Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_TOKEN: ${{ secrets.HARBOR_TOKEN }}
        run: echo "$HARBOR_TOKEN" | docker login harbor.brefwiz.com -u "$HARBOR_USER" --password-stdin

      - name: Start OTel Collector
        run: |
          mkdir -p collector-output && chmod 777 collector-output
          export OTEL_UID=$(id -u) OTEL_GID=$(id -g)
          docker compose up -d
          echo "Waiting for collector to accept connections..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 4317 2>/dev/null; then
              echo "Collector ready"
              break
            fi
            sleep 1
          done

      - name: "Coverage: unit + e2e (100% gate)"
        env:
          CARGO_REGISTRIES_BREFWIZ_TOKEN: "Bearer ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}"
        run: |
          docker run --rm --name otel-coverage \
            --network host \
            -v "$PWD:/workspace" -w /workspace \
            -e CARGO_TERM_COLOR=always \
            -e RUST_BACKTRACE=1 \
            -e CARGO_REGISTRIES_BREFWIZ_TOKEN="$CARGO_REGISTRIES_BREFWIZ_TOKEN" \
            ${{ vars.RUST_CI_IMAGE }} \
            sh -c "make install-nextest install-llvm-cov && make ci-coverage 2>&1 | tee /tmp/ci-coverage.log"

      - name: Collector diagnostics
        if: failure()
        run: |
          echo "=== Collector logs ==="
          docker compose logs --tail=100
          echo ""
          echo "=== Trace output ==="
          cat collector-output/traces.jsonl 2>/dev/null || echo "(empty)"

      - if: failure()
        uses: ./.ci-workflows/.gitea/actions/post-failure-log
        with:
          step: coverage
          log-file: /tmp/ci-coverage.log

      - name: Upload coverage report
        if: always()
        uses: forgejo/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

      - name: Cleanup
        if: always()
        timeout-minutes: 1
        run: docker compose down 2>/dev/null || true

  # ==========================================================================
  # auto-tag — creates a semver tag when Cargo.toml version is new.
  # Tag push then triggers release.yml automatically.
  # ==========================================================================
  auto-tag:
    name: Auto-tag release
    runs-on: brefwiz
    needs: [fmt, clippy, audit, test, e2e]
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: brefwiz/ci-workflows
          ref: main
          path: .ci-workflows
          token: ${{ secrets.PACKAGE_READER_TOKEN || secrets.PACKAGE_PUBLISHER_TOKEN }}
      - uses: ./.ci-workflows/.gitea/actions/auto-tag
        with:
          checkout: "false"
          gitea-token: ${{ secrets.PACKAGE_PUBLISHER_TOKEN }}
