name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-rust:
    uses: brefwiz/shared-ci-workflows/.github/workflows/release-rust.yml@main
    with:
      crates: "otel-bootstrap"
    secrets:
      cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    permissions:
      contents: write
