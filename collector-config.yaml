receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  file/traces:
    path: /var/lib/otel/traces.jsonl
    flush_interval: 1s
  file/metrics:
    path: /var/lib/otel/metrics.jsonl
    flush_interval: 1s

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [file/traces]
    metrics:
      receivers: [otlp]
      exporters: [file/metrics]
